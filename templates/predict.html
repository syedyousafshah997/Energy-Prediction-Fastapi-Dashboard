<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Predict Energy Consumption</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f9; color: #222; }
    nav { background: #2c3e50; padding: 14px 24px; }
    nav a { color: #fff; text-decoration: none; margin-right: 20px; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    .container { max-width: 600px; margin: 40px auto; padding: 24px; background: #fff;
                  border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 20px; padding: 10px 20px; background: #2c3e50; color: #fff;
              border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
    button:hover { background: #1a252f; }
    .result { margin-top: 20px; padding: 14px; background: #eafbe7; border-radius: 6px;
                font-size: 1.2em; font-weight: bold; color: #1e6b1e; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/predict">Prediction</a>
  </nav>
  <div class="container">
    <h1>Predict Energy Consumption</h1>
    <form method="POST" action="/predict">
      {% for feature in features %}
        <label for="{{ feature }}">{{ feature }}</label>
        {% if feature in categorical_options %}
          <select name="{{ feature }}" id="{{ feature }}">
            {% for option in categorical_options[feature] %}
              <option value="{{ option }}">{{ option }}</option>
            {% endfor %}
          </select>
        {% else %}
          <input type="text" name="{{ feature }}" id="{{ feature }}" required>
        {% endif %}
      {% endfor %}
      <button type="submit">Predict</button>
    </form>

    {% if prediction is not none %}
      <div class="result">Predicted Usage_kWh: {{ prediction }}</div>
    {% endif %}
  </div>
</body>
</html>
